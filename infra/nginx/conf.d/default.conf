# nginx/conf.d/default.conf
#
# This directory is mounted into the nginx container and its files are
# loaded by the include directive in nginx.conf's http block.
#
# NOTE: The primary server blocks (port 80, API proxy, web proxy) are
# defined in nginx.conf itself. Do NOT add a duplicate server block here —
# that would create a conflicting server_name on port 80.
#
# Add new virtual-host or location snippets here only if you need to extend
# the configuration beyond what nginx.conf already provides.
#
# Example — adding a staging subdomain server block:
#
# server {
#     listen 80;
#     server_name staging.racommunity.local;
#     location / {
#         proxy_pass http://web:3000;
#         proxy_set_header Host $host;
#     }
# }
